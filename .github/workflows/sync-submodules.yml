name: Sync submodules

on:
  repository_dispatch:
    types: [submodule-push]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout padre (sin submódulos)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Inicializar submódulos y actualizar al último commit de main
        run: |
          git submodule init
          git submodule update --remote --merge

      - name: Commit y push si hay cambios
        run: |
          git diff --quiet && git diff --staged --quiet || (
            git add .
            git commit -m "chore: sync submodules to latest [skip ci]"
            git push
          )