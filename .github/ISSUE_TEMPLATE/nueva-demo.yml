name: Añadir módulo existente
description: Solicita la incorporación de tu repositorio ya creado a la colección InnovaDEF Demos
title: "[MÓDULO] "
labels: ["nueva-demo"]
assignees: MartinSuarez-Pumpun
body:
  - type: markdown
    attributes:
      value: |
        **Requisito previo:** tu repositorio debe tener una rama `main` con el código listo y funcional.
        Cuando el propietario añada la etiqueta `approved`, el proceso de incorporación se ejecutará automáticamente.

        **¿Repo privado?** Añade la cuenta `innovadef-org` como colaborador con rol **Write** en tu repo (Settings → Collaborators) antes de enviar esta solicitud. Sin ese acceso no es posible incorporar repos privados.

  - type: input
    id: repo_url
    attributes:
      label: URL del repositorio
      description: URL completa de tu repo de GitHub
      placeholder: "https://github.com/usuario/demo-mi-modulo"
    validations:
      required: true

  - type: input
    id: module_name
    attributes:
      label: Nombre del módulo (carpeta)
      description: "**Debe empezar por `demo-`** (ej: `demo-mi-modulo`). Es la convención que usa el sistema de auto-discovery — sin el prefijo el módulo no aparecerá en el dashboard."
      placeholder: "demo-mi-modulo"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Descripción
      description: ¿Qué hace este módulo? ¿Qué concepto ilustra o qué problema resuelve?
    validations:
      required: true

  - type: textarea
    id: stack
    attributes:
      label: Stack tecnológico
      description: React, Three.js, Python, Unity...
      placeholder: "React + Vite, Three.js, xAI API..."
    validations:
      required: false

  - type: checkboxes
    id: confirmacion
    attributes:
      label: Confirmación
      options:
        - label: Mi repositorio tiene una rama `main` con el código listo
          required: true
        - label: El nombre de la carpeta empieza por `demo-`
          required: true
        - label: Mi repositorio es **público** (si es privado, lee las instrucciones de arriba)
          required: false
        - label: Entiendo que se añadirá un workflow de CI/CD a mi repo automáticamente
          required: true